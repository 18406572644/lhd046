<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0f0c29" />
    <meta name="description" content="星梦奇缘 - 探索十二星座的神秘世界，了解每日运势" />
    <link rel="dns-prefetch" href="//unpkg.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <title>星梦奇缘 - 星座运势</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      html, body {
        height: 100%;
        background: linear-gradient(180deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
        overflow-x: hidden;
      }
      
      #app {
        min-height: 100vh;
      }
      
      .skeleton-loader {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 9999;
        background: linear-gradient(180deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        transition: opacity 0.5s ease, visibility 0.5s ease;
      }
      
      .skeleton-loader.hidden {
        opacity: 0;
        visibility: hidden;
      }
      
      .skeleton-logo {
        font-size: 48px;
        font-weight: 700;
        background: linear-gradient(135deg, #fff 0%, #c9b6ff 50%, #a78bfa 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 24px;
        animation: skeleton-fade-in 0.8s ease;
      }
      
      .skeleton-spinner {
        width: 48px;
        height: 48px;
        border: 3px solid rgba(167, 139, 250, 0.2);
        border-top-color: #a78bfa;
        border-radius: 50%;
        animation: skeleton-spin 0.8s linear infinite;
      }
      
      .skeleton-text {
        margin-top: 16px;
        color: rgba(255, 255, 255, 0.6);
        font-size: 14px;
        animation: skeleton-pulse 1.5s ease-in-out infinite;
      }
      
      @keyframes skeleton-spin {
        to {
          transform: rotate(360deg);
        }
      }
      
      @keyframes skeleton-fade-in {
        from {
          opacity: 0;
          transform: translateY(-20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      
      @keyframes skeleton-pulse {
        0%, 100% {
          opacity: 0.4;
        }
        50% {
          opacity: 0.8;
        }
      }
      
      .skeleton-stars {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        overflow: hidden;
      }
      
      .skeleton-star {
        position: absolute;
        width: 2px;
        height: 2px;
        background: white;
        border-radius: 50%;
        opacity: 0.5;
        animation: skeleton-twinkle 3s ease-in-out infinite;
      }
      
      @keyframes skeleton-twinkle {
        0%, 100% {
          opacity: 0.3;
        }
        50% {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div class="skeleton-loader" id="skeletonLoader">
      <div class="skeleton-stars" id="skeletonStars"></div>
      <div class="skeleton-logo">✨ 星梦奇缘</div>
      <div class="skeleton-spinner"></div>
      <div class="skeleton-text">正在加载星座运势...</div>
    </div>
    <div id="app"></div>
    <script>
      (function() {
        var starsContainer = document.getElementById('skeletonStars');
        if (starsContainer) {
          for (var i = 0; i < 50; i++) {
            var star = document.createElement('div');
            star.className = 'skeleton-star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 3 + 's';
            var size = Math.random() * 2 + 1;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            starsContainer.appendChild(star);
          }
        }
        
        window.addEventListener('load', function() {
          setTimeout(function() {
            var loader = document.getElementById('skeletonLoader');
            if (loader) {
              loader.classList.add('hidden');
              setTimeout(function() {
                loader.remove();
              }, 500);
            }
          }, 300);
        });
      })();
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
